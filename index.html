<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGrant | Scholarship Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>EduGrant</span>
        </div>
        <nav>
            <div class="nav-item active" onclick="switchTab('available')">
                <i class="fas fa-search"></i> Browse Grants
            </div>
            <div class="nav-item" onclick="switchTab('my-applications')">
                <i class="fas fa-file-invoice"></i> My Applications
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <i class="fas fa-user-circle"></i> Profile
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="grantSearch" placeholder="Search scholarships..." onkeyup="searchGrants()">
            </div>
            <div class="user-meta">
                <span id="studentName">Alex Johnson</span>
                <div class="avatar">AJ</div>
            </div>
        </header>

        <!-- Tab: Available Scholarships -->
        <section id="available" class="tab-content active">
            <div class="welcome-banner">
                <h1>Find Your Future</h1>
                <p>Explore over 50+ active scholarships tailored to your academic profile.</p>
            </div>
            <div class="grant-grid" id="grantGrid">
                <!-- Cards injected by JS -->
            </div>
        </section>

        <!-- Tab: My Applications -->
        <section id="my-applications" class="tab-content">
            <h2>Track Applications</h2>
            <div class="status-table-container">
                <table id="statusTable">
                    <thead>
                        <tr>
                            <th>Scholarship</th>
                            <th>Date Applied</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="appHistory">
                        <!-- History injected by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Application Modal -->
    <div id="applyModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Apply for Scholarship</h3>
            <form id="scholarshipForm">
                <div class="form-group">
                    <label>Current GPA</label>
                    <input type="number" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Statement of Purpose</label>
                    <textarea rows="4" placeholder="Why do you deserve this grant?"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Submit Application</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
